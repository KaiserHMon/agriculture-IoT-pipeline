# S3 Configuration
s3:
  bronze_prefix: "bronze/agriculture_sensors"

# Local Paths
paths:
  input_dir: "data/input"
  processed_dir: "data/processed"

# Ingestion Settings
ingestion:
  allowed_extensions:
    - ".csv"
    - ".xlsx"
  date_columns:
    - "timestamp"
    - "sowing_date"
    - "reading_time"
